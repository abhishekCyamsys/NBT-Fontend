name: Deploy to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: nbt-web-990247895647-ap-south-1-an
  CLOUDFRONT_DISTRIBUTION_ID: EM5562KB0F28V
  VITE_AUTH_BASE_URL: ${{ vars.VITE_AUTH_BASE_URL }}
  VITE_VISITOR_BASE_URL: ${{ vars.VITE_VISITOR_BASE_URL }}
  VITE_VOLUNTEER_BASE_URL: ${{ vars.VITE_VOLUNTEER_BASE_URL }}
  VITE_ADMIN_BASE_URL: ${{ vars.VITE_ADMIN_BASE_URL }}
  VITE_EVENT_ID: ${{ vars.VITE_EVENT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite application
        run: npm run build

      - name: Debug - Verify environment and secrets
        run: |
          echo "Environment: prod"
          echo "AWS_REGION: ${{ env.AWS_REGION }}"
          echo "S3_BUCKET: ${{ env.S3_BUCKET }}"
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "ERROR: AWS_ROLE_ARN secret is empty or not found"
            exit 1
          else
            echo "AWS_ROLE_ARN is set"
          fi
          if [ -z "${{ env.VITE_AUTH_BASE_URL }}" ]; then
            echo "ERROR: VITE_AUTH_BASE_URL repo variable is empty or not found"
            exit 1
          fi
          if [ -z "${{ env.VITE_VISITOR_BASE_URL }}" ]; then
            echo "ERROR: VITE_VISITOR_BASE_URL repo variable is empty or not found"
            exit 1
          fi
          if [ -z "${{ env.VITE_VOLUNTEER_BASE_URL }}" ]; then
            echo "ERROR: VITE_VOLUNTEER_BASE_URL repo variable is empty or not found"
            exit 1
          fi
          if [ -z "${{ env.VITE_ADMIN_BASE_URL }}" ]; then
            echo "ERROR: VITE_ADMIN_BASE_URL repo variable is empty or not found"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3 with proper Content-Types
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "*.html" \
            --exclude "*.css" \
            --exclude "*.js" \
            --exclude "*.mjs" \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --content-type "text/html" \
            --cache-control "public, max-age=0, must-revalidate"

          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "*" \
            --include "*.css" \
            --content-type "text/css" \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "*" \
            --include "*.js" \
            --include "*.mjs" \
            --content-type "application/javascript" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != 'your-cloudfront-distribution-id'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Deployment completed successfully!"
          echo "Website bucket: s3://${{ env.S3_BUCKET }}"
          if [ "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" != "your-cloudfront-distribution-id" ]; then
            echo "CloudFront cache invalidated"
          fi
